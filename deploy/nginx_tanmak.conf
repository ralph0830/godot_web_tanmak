# ============================================================
# TANMAK — Godot 웹 정적 서버 (nginx)
# ------------------------------------------------------------
# Nginx Proxy Manager(NPM) 가 앞단에서 도메인/HTTPS 를 종료하고,
# 이 nginx 는 포트 2713 에서 Godot 웹 빌드 정적 파일을 서빙한다.
#
# 설치(우분투 서버에서 1회):
#   sudo cp deploy/nginx_tanmak.conf /etc/nginx/sites-available/tanmak
#   sudo ln -s /etc/nginx/sites-available/tanmak /etc/nginx/sites-enabled/tanmak
#   sudo mkdir -p /home/ralph/work/web/tanmak
#   sudo chown -R $USER:$USER /home/ralph/work/web/tanmak
#   sudo nginx -t && sudo systemctl reload nginx
# ============================================================

server {
    listen 2713 default_server;
    listen [::]:2713 default_server;
    server_name _;

    root /home/ralph/work/web/tanmak;
    index index.html;

    # Godot 웹 안정성 헤더 (nothreads 내보내기라 필수는 아니지만 안전망)
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;

    # 기본 MIME — /etc/nginx/mime.types 가 wasm(application/wasm) 포함
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Brotli 사전 압축 파일 서빙 (.br) — nginx brotli 모듈 필요 없이 Content-Encoding 만 처리
    location ~* \.wasm\.br$ {
        add_header Content-Encoding br;
        default_type application/wasm;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
    }
    location ~* \.js\.br$ {
        add_header Content-Encoding br;
        default_type text/javascript;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
    }
    location ~* \.pck\.br$ {
        add_header Content-Encoding br;
        default_type application/octet-stream;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
    }

    # 메인: 정적 파일 서빙 + gzip 사전 압축
    location / {
        try_files $uri $uri/ =404;
        gzip_static on;
    }

    # wasm/pck 캐싱 (빌드마다 갱신되므로 짧게)
    location ~* \.(wasm|pck)$ {
        expires 1h;
        add_header Cache-Control "public";
    }

    # 엑세스 로그
    access_log /var/log/nginx/tanmak_access.log;
    error_log  /var/log/nginx/tanmak_error.log;
}
